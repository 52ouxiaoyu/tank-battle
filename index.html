<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tank Battle - NES Clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div id="hud" class="hidden">
            <div class="score-box">
                <span class="p1-color">P1 SCORE</span>
                <span id="p1-score">00000</span>
            </div>
            <div id="mid-info">
                <div id="stage-info">STAGE 1</div>
                <div id="lives-info">LIVES: ❤️x3</div>
            </div>
            <div class="score-box">
                <span class="p2-color">P2 SCORE</span>
                <span id="p2-score">00000</span>
            </div>
        </div>
        <div id="ui-layer">
            <div id="start-screen" class="screen">
                <h1>TANK BATTLE</h1>
                <p>Player 1: WASD + SPACE</p>
                <p>  Dash: L-Shift | Fever: F</p>
                <p>Player 2: Arrows + ENTER</p>
                <p>  Dash: Numpad0 | Fever: Numpad.</p>
                <button id="start-btn">START GAME</button>
            </div>
            <div id="game-over-screen" class="screen hidden">
                <h1>GAME OVER</h1>
                <button id="restart-btn">RESTART</button>
            </div>
        </div>
        <canvas id="game-canvas"></canvas>
    </div>
    <script src="game.js"></script>
</body>
</html>
